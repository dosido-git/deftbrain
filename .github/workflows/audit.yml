name: Audit
on:
  push:
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check:syntax
      # Phase 1 (now): report warnings, never block.
      - run: npm run lint
      # Phase 2 (once `npm run audit` passes clean locally): swap the line
      # above for the line below to make the gate blocking.
      # - run: npm run audit
      - run: node scripts/scan-guard-keys.js