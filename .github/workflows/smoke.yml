name: Production smoke test

# Hits critical production URLs on a schedule. Fails the workflow if any
# return non-200. GitHub emails the repo owner on failure (configurable
# at github.com/settings/notifications).
#
# This is the runtime safety net. The build-time net is verify-build.js;
# this catches drift that survives the build (Fastly cache stuck on a
# stale 404, server.js routing regression, DNS issue, etc.).

on:
  schedule:
    # Every 6 hours. Adjust to taste — '0 * * * *' for hourly,
    # '0 12 * * *' for daily noon UTC.
    - cron: '0 */6 * * *'
  workflow_dispatch:  # manual trigger button in Actions tab

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Hit critical URLs
        run: |
          set +e  # don't exit on first failure — collect all
          FAIL=0

          URLS=(
            # Hubs
            "https://deftbrain.com/"
            "https://deftbrain.com/guides"
            "https://deftbrain.com/guides/by-tool"

            # All 18 guide category indexes
            "https://deftbrain.com/guides/apologies"
            "https://deftbrain.com/guides/career"
            "https://deftbrain.com/guides/conversations"
            "https://deftbrain.com/guides/cooking"
            "https://deftbrain.com/guides/decisions"
            "https://deftbrain.com/guides/health"
            "https://deftbrain.com/guides/home"
            "https://deftbrain.com/guides/learning"
            "https://deftbrain.com/guides/meetings"
            "https://deftbrain.com/guides/money"
            "https://deftbrain.com/guides/pets"
            "https://deftbrain.com/guides/planning"
            "https://deftbrain.com/guides/practical"
            "https://deftbrain.com/guides/presentations"
            "https://deftbrain.com/guides/speeches"
            "https://deftbrain.com/guides/travel"
            "https://deftbrain.com/guides/wellness"
            "https://deftbrain.com/guides/workplace"

            # Sample tool pages — cross-category coverage
            # Rotate or expand periodically to widen regression surface
            # Money / Loot
            "https://deftbrain.com/BuyWise"
            "https://deftbrain.com/BillRescue"
            "https://deftbrain.com/SubSweep"
            "https://deftbrain.com/RentersDepositSaver"
            "https://deftbrain.com/MoneyDiplomat"
            # Career / Grind
            "https://deftbrain.com/SkillGapMap"
            "https://deftbrain.com/LeverageLogic"
            "https://deftbrain.com/BragSheetBuilder"
            # Decisions / Mind
            "https://deftbrain.com/DecisionCoach"
            "https://deftbrain.com/PreMortem"
            "https://deftbrain.com/DebateMe"
            # Social / Humans
            "https://deftbrain.com/ConflictCoach"
            "https://deftbrain.com/MagicMouth"
            "https://deftbrain.com/DifficultTalkCoach"
            # Out & About
            "https://deftbrain.com/DateNight"
            "https://deftbrain.com/PartyArchitect"
            "https://deftbrain.com/MicroAdventureMapper"
            # Health / Body
            "https://deftbrain.com/ProcedureProbe"
            "https://deftbrain.com/DoctorVisitPrep"
            # Focus / Energy
            "https://deftbrain.com/FocusPocus"
            "https://deftbrain.com/FocusSoundArchitect"
            # Miscellaneous
            "https://deftbrain.com/NameAudit"
            "https://deftbrain.com/GhostWriter"
            "https://deftbrain.com/RecipeChaosSolver"

            # Sitemaps
            "https://deftbrain.com/sitemap.xml"
            "https://deftbrain.com/guides-sitemap.xml"
            "https://deftbrain.com/sitemap-app.xml"
          )

          for url in "${URLS[@]}"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 10 "$url")
            if [ "$code" != "200" ]; then
              echo "❌ $url → $code"
              FAIL=$((FAIL+1))
            else
              echo "✅ $url → $code"
            fi
          done

          if [ $FAIL -gt 0 ]; then
            echo ""
            echo "$FAIL URL(s) failed."
            exit 1
          fi
          echo ""
          echo "All URLs healthy."
